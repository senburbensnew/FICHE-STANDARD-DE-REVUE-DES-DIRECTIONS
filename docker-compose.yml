services:

  # ── MySQL ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: mef_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootChangeMe!2024}
      MYSQL_DATABASE: mef_fiches
      MYSQL_USER: ${MYSQL_USER:-mef_user}
      MYSQL_PASSWORD: ${MYSQL_PASS:-ChangeMe!2024}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mef_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-RootChangeMe!2024}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: mef_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS:-admin}
      KC_DB: dev-mem
      KC_HTTP_PORT: 8180
    volumes:
      - ./keycloak/realm-mef.json:/opt/keycloak/data/import/realm-mef.json:ro
    ports:
      - "8180:8180"
    networks:
      - mef_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8180/realms/mef || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: mef_backend
    restart: unless-stopped
    environment:
      PORT: 5001
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: mef_fiches
      MYSQL_USER: ${MYSQL_USER:-mef_user}
      MYSQL_PASS: ${MYSQL_PASS:-ChangeMe!2024}
      CLIENT_URL: http://localhost
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_REALM: mef
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - mef_net

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./mef-form
      args:
        VITE_API_URL: http://localhost:5001/api
        VITE_KEYCLOAK_URL: http://localhost:8180
        VITE_KEYCLOAK_REALM: mef
        VITE_KEYCLOAK_CLIENT: mef-form
    container_name: mef_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - keycloak
    networks:
      - mef_net

volumes:
  mysql_data:

networks:
  mef_net:
    driver: bridge
