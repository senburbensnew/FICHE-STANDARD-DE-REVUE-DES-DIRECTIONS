services:

  # ── MySQL ────────────────────────────────────────────────────────
  mysql:
    build:
      context: ./mysql
    container_name: mef_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootChangeMe!2024}
      MYSQL_DATABASE: mef_fiches
      MYSQL_USER: ${MYSQL_USER:-mef_user}
      MYSQL_PASSWORD: ${MYSQL_PASS:-ChangeMe!2024}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mef_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-RootChangeMe!2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Keycloak ────────────────────────────────────────────────────
  keycloak:
    build:
      context: ./keycloak
    container_name: mef_keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS:-admin}
      KC_HTTP_PORT: 8180
      KC_HTTP_RELATIVE_PATH: /kc
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
    volumes:
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8180:8180"
    networks:
      - mef_net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180 && printf 'GET /kc/realms/mef HTTP/1.1\\r\\nHost: localhost:8180\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"realm\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: mef_backend
    restart: unless-stopped
    environment:
      PORT: 5001
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: mef_fiches
      DB_FORCE: ${DB_FORCE:-false}
      MYSQL_USER: ${MYSQL_USER:-mef_user}
      MYSQL_PASS: ${MYSQL_PASS:-ChangeMe!2024}
      CLIENT_URL: http://frontend
      KEYCLOAK_URL: http://keycloak:8180/kc
      KEYCLOAK_REALM: mef
      KEYCLOAK_ISSUER: http://keycloak:8180/kc/realms/mef
      KC_ADMIN: ${KC_ADMIN:-admin}
      KC_ADMIN_PASS: ${KC_ADMIN_PASS:-admin}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-c0a0221c9a73aeb5bb14a4e329b63c95334ea33073e7f531f8d86cf490e73ef8}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@mef.ht}
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - mef_net

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./mef-form
      args:
        VITE_KEYCLOAK_REALM: mef
        VITE_KEYCLOAK_CLIENT: mef-form
    container_name: mef_frontend
    restart: unless-stopped
    depends_on:
      - backend
      - keycloak
    networks:
      - mef_net

  # ── Nginx reverse proxy (TLS termination) ───────────────────────
  nginx-proxy:
    build:
      context: ./nginx
    container_name: mef_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - mef_net

volumes:
  mysql_data:
  keycloak_data:

networks:
  mef_net:
    driver: bridge
