services:

  # ── MongoDB ─────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mef_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-secret}
      MONGO_INITDB_DATABASE: mef_fiches
    volumes:
      - mongo_data:/data/db
    networks:
      - mef_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: mef_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS:-admin}
      KC_DB: dev-mem
      KC_HTTP_PORT: 8080
    volumes:
      - ./keycloak/realm-mef.json:/opt/keycloak/data/import/realm-mef.json:ro
    ports:
      - "8080:8080"
    networks:
      - mef_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/realms/mef || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: mef_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/mef_fiches?authSource=admin
      CLIENT_URL: http://localhost
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: mef
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - mef_net

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./mef-form
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: mef
        VITE_KEYCLOAK_CLIENT: mef-form
    container_name: mef_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - keycloak
    networks:
      - mef_net

volumes:
  mongo_data:

networks:
  mef_net:
    driver: bridge
